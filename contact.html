<header class="site-header">
  <div class="hero" id="hero">
    <h1 class="hero-title">ご要望・お問い合わせ</h1>
    <p class="hero-detail">機能リクエスト・バグ報告・ご感想など、何でもお気軽にどうぞ。</p>
  </div>
</header>

<div class="nav-spacer" id="navSpacer"></div>

<main>
  <div class="contact-wrap">
    <a href="/" class="contact-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      ツールに戻る
    </a>

    <div class="contact-card">
      <form id="contactForm">
        <div style="display:flex;flex-direction:column;gap:18px;">
          <div class="form-group">
            <label for="fieldType">お問い合わせの種別<span class="form-required">必須</span></label>
            <select class="form-input" id="fieldType" required>
              <option value="">選択してください</option>
              <option value="機能リクエスト">機能リクエスト</option>
              <option value="バグ報告">バグ報告</option>
              <option value="ご感想">ご感想</option>
              <option value="その他">その他</option>
            </select>
          </div>

          <div class="form-group">
            <label for="fieldMessage">お問い合わせ内容<span class="form-required">必須</span></label>
            <textarea class="form-input" id="fieldMessage" rows="6" placeholder="内容をご記入ください" required maxlength="1000"></textarea>
            <p class="form-hint">1000文字以内</p>
          </div>

          <div class="form-group">
            <label for="fieldName">お名前<span class="form-optional">任意</span></label>
            <input class="form-input" type="text" id="fieldName" placeholder="例：山田 太郎" maxlength="50">
            <p class="form-hint">50文字以内</p>
          </div>

          <div class="form-group">
            <label for="fieldEmail">メールアドレス<span class="form-optional">任意・返信が必要な場合</span></label>
            <input class="form-input" type="email" id="fieldEmail" placeholder="例：example@email.com">
          </div>

          <button class="form-submit" type="submit" id="submitBtn">送信する</button>
        </div>
      </form>

      <div class="form-status" id="formStatus" role="alert"></div>
    </div>
  </div>
</main>
