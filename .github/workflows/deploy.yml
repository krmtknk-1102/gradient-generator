name: Deploy to ConohaVPS

# mainブランチへのpushをトリガーに実行
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # リポジトリのコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # Node.jsをセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 依存パッケージをインストール
      - name: Install dependencies
        run: npm install

      # 本番用ビルド
      - name: Build
        run: npm run build

      # SSHの秘密鍵を設定
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # dist/をVPSに転送
      - name: Deploy to VPS
        run: |
          rsync -avz --delete dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/krmtknk/apps/gradient-generator/